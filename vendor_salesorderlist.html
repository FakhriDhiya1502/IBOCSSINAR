<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vendor | Sales Order List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: #f4f6f9; font-family: Arial, Helvetica, sans-serif; }
        .sidebar { min-height: calc(100vh - 56px); }
        .nav-pill { border-radius: 10px; }
        .my-card { border: 0; }
        .muted-xs { font-size: .82rem; color: #6c757d; }

        :root {
            --bg: #f4f6f9;
            --card: #fff;
            --line: #d9e0ea;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #2563eb;
            --success: #15803d;
            --warning: #b45309;
            --soft: #f8fafc;
        }

        .page {
            padding: 16px;
            background: white; border-radius: 10px; border: 1px solid var(--line);
        }

        .toolbar,
        .my-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 10px;
        }

        .toolbar {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            box-shadow: 0 2px 8px rgba(15, 23, 42, .04);
        }

        button {
            border: 1px solid var(--line);
            background: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        button.primary {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .my-card {
            padding: 14px;
            margin-bottom: 14px;
            box-shadow: 0 2px 8px rgba(15, 23, 42, .04);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        @media (max-width: 900px) {
            .form-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        .field label {
            font-size: 11px;
            color: var(--muted);
            font-weight: 700;
        }

        .field input,
        .field select {
            padding: 8px;
            border: 1px solid var(--line);
            border-radius: 6px;
        }

        .table-wrap {
            overflow: auto;
            border: 1px solid var(--line);
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th,
        td {
            border-bottom: 1px solid var(--line);
            padding: 8px;
            text-align: left;
            white-space: nowrap;
        }

        th {
            background: var(--soft);
        }

        .status {
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
        }

        .status-draft     { background: #e0f2fe; color: #0369a1; }
        .status-submitted { background: #dcfce7; color: #166534; }
        .status-open      { background: #d1fae5; color: #065f46; }

        .type {
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 12px;
        }

        .type-forecast { background: #dbeafe; color: #1d4ed8; }
        .type-manual   { background: #f3f4f6; color: #374151; }
        .type-special  { background: #fef3c7; color: #92400e; }
        .type-from-po  { background: #ede9fe; color: #5b21b6; }

        .btn-confirm {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-confirm:hover { background: #a7f3d0; }

        .source-po-badge {
            display: inline-block;
            font-size: 10px;
            background: #ede9fe;
            color: #5b21b6;
            border-radius: 4px;
            padding: 2px 5px;
            margin-left: 4px;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <!-- Topbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container-fluid px-3">
            <a class="navbar-brand fw-bold" href="vendor_dashboard.html">IBOCS</a>
            <span class="navbar-text text-white-50 small d-none d-md-inline">Vendor Portal</span>

            <div class="ms-auto d-flex align-items-center gap-2">
                <div class="dropdown">
                    <button class="btn btn-outline-light btn-sm dropdown-toggle" data-bs-toggle="dropdown"
                        id="userBtn">User</button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><span class="dropdown-item-text small text-muted" id="userInfo">-</span></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="index.html">Ganti Portal</a></li>
                        <li><button class="dropdown-item text-danger" id="btnLogout">Logout</button></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-3">
        <div class="row g-3">
            
            <!-- Sidebar -->
            <div class="col-lg-2" id="sidebar-container"></div>

            <!-- Main -->
            <div class="col-lg-10">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="mb-0 text-success fw-bold"><i class="bi bi-card-list me-2"></i>Sales Order List</h4>
                </div>

                <div class="page shadow-sm">
                    <div class="toolbar">
                        <div><b>Sales Order List</b></div>
                        <div>
                            <button class="primary" onclick="window.location.href='vendor_salesorder.html'">+ New SO</button>
                        </div>
                    </div>

                    <div class="my-card">
                        <div class="form-grid">
                            <div class="field"><label>SO No</label><input id="fSoNo" placeholder="Search..." /></div>
                            <div class="field"><label>Store</label>
                                <input id="fStore" placeholder="Search store..." />
                            </div>
                            <div class="field"><label>Status</label>
                                <select id="fStatus">
                                    <option value="">All</option>
                                    <option value="Draft">Draft</option>
                                    <option value="Open">Open</option>
                                    <option value="Submitted">Submitted</option>
                                </select>
                            </div>
                            <div class="field"><label>Date From</label><input id="fDateFrom" type="date" /></div>
                            <div class="field"><label>Date To</label><input id="fDateTo" type="date" /></div>
                        </div>
                        <div style="margin-top:10px; display:flex; gap:8px;">
                            <button class="primary" onclick="renderTable()">Search</button>
                            <button onclick="resetFilter()">Reset</button>
                        </div>
                    </div>

                    <div class="my-card">
                        <div class="table-wrap">
                            <table>
                                <thead>
                                    <tr>
                                        <th>SO No</th>
                                        <th>SO Date</th>
                                        <th>Delivery Date</th>
                                        <th>Store</th>
                                        <th>Type</th>
                                        <th>Slot</th>
                                        <th>Total Qty</th>
                                        <th>Status</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="soBody">
                                    <tr><td colspan="9" style="text-align:center;padding:24px;color:#6b7280;">Loading...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="text-center text-muted small mt-4 mb-2">
                    © 2026 IBOCS — Vendor Portal
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="sidebar.js"></script>

    <script>
        // =========================
        // SESSION GUARD
        // =========================
        const sess = localStorage.getItem("IBOCS_user");
        if (!sess) window.location.href = "login.html?role=vendor";
        const user = JSON.parse(sess);

        document.getElementById("userBtn").textContent = user.name || "User";
        document.getElementById("userInfo").textContent = `${user.email} • role=${user.role}`;

        document.getElementById("btnLogout").addEventListener("click", () => {
            localStorage.removeItem("IBOCS_user");
            window.location.href = "index.html";
        });

        // =========================
        // SIDEBAR INJECTION
        // =========================
        document.addEventListener("DOMContentLoaded", () => {
            new SidebarSystem(null, 'salesorder').render();
            renderTable();
        });

        // =========================
        // STATIC DEMO DATA (fallback rows, shown when localStorage is empty)
        // =========================
        const DEMO_SO = [
            { soNo: "SO-202604-1001", soDate: "2026-04-01", deliveryDate: "2026-04-02", store: "Toko Melati", type: "FORECAST", slot: "AM", totalQty: 25, status: "Draft",     sourcePoNo: null },
            { soNo: "SO-202604-1002", soDate: "2026-04-01", deliveryDate: "2026-04-02", store: "Toko Mawar",  type: "SPECIAL",  slot: "PM", totalQty: 12, status: "Submitted", sourcePoNo: null }
        ];

        function getSoList() {
            const stored = JSON.parse(localStorage.getItem("IBOCS_so_list") || "[]");
            // Merge: stored first (newest), then demo rows that don't have duplicate soNo
            const storedNos = new Set(stored.map(s => s.soNo));
            return [...stored, ...DEMO_SO.filter(d => !storedNos.has(d.soNo))];
        }

        function saveSoList(list) {
            // Only persist non-demo rows back
            const demoNos = new Set(DEMO_SO.map(d => d.soNo));
            localStorage.setItem("IBOCS_so_list", JSON.stringify(list.filter(s => !demoNos.has(s.soNo))));
        }

        function typeLabel(type) {
            const map = {
                FORECAST: '<span class="type type-forecast">Forecast</span>',
                MANUAL:   '<span class="type type-manual">Manual</span>',
                SPECIAL:  '<span class="type type-special">Special</span>',
                FROM_PO:  '<span class="type type-from-po">From PO</span>'
            };
            return map[type] || `<span class="type type-manual">${type}</span>`;
        }

        function statusLabel(s) {
            const map = {
                Draft:     '<span class="status status-draft">Draft</span>',
                Open:      '<span class="status status-open">Open</span>',
                Submitted: '<span class="status status-submitted">Submitted</span>'
            };
            return map[s] || `<span class="status">${s}</span>`;
        }

        function renderTable() {
            const fSoNo     = document.getElementById("fSoNo").value.toLowerCase();
            const fStore    = document.getElementById("fStore").value.toLowerCase();
            const fStatus   = document.getElementById("fStatus").value;
            const fDateFrom = document.getElementById("fDateFrom").value;
            const fDateTo   = document.getElementById("fDateTo").value;

            let list = getSoList().filter(s => {
                if (fSoNo   && !s.soNo.toLowerCase().includes(fSoNo))     return false;
                if (fStore  && !s.store.toLowerCase().includes(fStore))   return false;
                if (fStatus && s.status !== fStatus)                       return false;
                if (fDateFrom && s.soDate < fDateFrom)                     return false;
                if (fDateTo   && s.soDate > fDateTo)                       return false;
                return true;
            });

            const tbody = document.getElementById("soBody");
            if (!list.length) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;padding:24px;color:#6b7280;">Tidak ada data.</td></tr>';
                return;
            }

            tbody.innerHTML = list.map((s, idx) => {
                const sourceTag = s.sourcePoNo ? `<span class="source-po-badge">PO: ${s.sourcePoNo}</span>` : "";
                const viewUrl = `vendor_salesorderview.html?soNo=${encodeURIComponent(s.soNo)}`;
                const actionBtns = s.status === "Draft" && s.sourcePoNo
                    ? `<button onclick="window.location.href='${viewUrl}'" class="btn-confirm">View → Confirm</button>`
                    : `<button onclick="window.location.href='${viewUrl}'">View</button>`;
                return `
                <tr>
                    <td>${s.soNo}${sourceTag}</td>
                    <td>${s.soDate || "-"}</td>
                    <td>${s.deliveryDate || "-"}</td>
                    <td>${s.store || "-"}</td>
                    <td>${typeLabel(s.type)}</td>
                    <td>${s.slot || "-"}</td>
                    <td>${s.totalQty ?? "-"}</td>
                    <td>${statusLabel(s.status)}</td>
                    <td>${actionBtns}</td>
                </tr>`;
            }).join("");
        }

        function confirmSO(soNo) {
            const list = getSoList();
            const idx  = list.findIndex(s => s.soNo === soNo);
            if (idx < 0) return;
            list[idx].status = "Open";
            saveSoList(list);
            renderTable();
        }

        function resetFilter() {
            document.getElementById("fSoNo").value     = "";
            document.getElementById("fStore").value    = "";
            document.getElementById("fStatus").value   = "";
            document.getElementById("fDateFrom").value = "";
            document.getElementById("fDateTo").value   = "";
            renderTable();
        }
    </script>
</body>
</html>
