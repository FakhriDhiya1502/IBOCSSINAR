<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>View Item Mappings — IBOCS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: #f4f6f9; }
        .sidebar { min-height: calc(100vh - 56px); }
        .card { border: 0; border-radius: 12px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid px-3">
            <a class="navbar-brand fw-bold" href="admin_dashboard.html">
                <i class="bi bi-shield-lock-fill me-2"></i>IBOCS Admin
            </a>
            <span class="navbar-text text-white-50 small d-none d-md-inline">Platform Management</span>
            <div class="ms-auto d-flex align-items-center gap-2">
                <div class="dropdown">
                    <button class="btn btn-outline-light btn-sm dropdown-toggle" data-bs-toggle="dropdown" id="userBtn">Admin</button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><span class="dropdown-item-text small text-muted" id="userInfo">-</span></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><button class="dropdown-item text-danger" id="btnLogout">Logout</button></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-3">
        <div class="row g-3">
            <div class="col-lg-2" id="sidebar-container"></div>
            <div class="col-lg-10">
                <div class="mb-4">
                    <a href="admin_item_mapping_list.html" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left"></i> Back to List</a>
                    <h5 class="fw-bold mt-2">Mapping Details</h5>
                    <div class="text-muted small">Viewing mapping logic between two selected entities.</div>
                </div>

                <div class="col-12 mb-4">
                    <div class="card shadow-sm border-0 border-top border-primary border-4">
                        <div class="card-body">
                            <div class="row text-center text-md-start align-items-center">
                                <div class="col-md-5">
                                    <div class="small text-muted text-uppercase fw-bold">Source Entity</div>
                                    <div class="fs-5 fw-bold text-primary" id="srcName">-</div>
                                    <div class="small text-secondary" id="srcCode">-</div>
                                </div>
                                <div class="col-md-2 text-center text-muted">
                                    <i class="bi bi-arrow-right-circle fs-1"></i>
                                </div>
                                <div class="col-md-5">
                                    <div class="small text-muted text-uppercase fw-bold">Target Entity</div>
                                    <div class="fs-5 fw-bold text-success" id="tgtName">-</div>
                                    <div class="small text-secondary" id="tgtCode">-</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header bg-white py-3">
                        <h6 class="mb-0 fw-bold">Mapped Items Configurations</h6>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-bordered mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th width="35%">Source Item (Original)</th>
                                        <th>Target Mapping Logic</th>
                                    </tr>
                                </thead>
                                <tbody id="mappingDetailsBody">
                                    <tr><td colspan="2" class="text-center py-4">Loading details...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <div class="card-footer bg-light text-end">
                        <a href="#" id="editMappingBtn" class="btn btn-primary"><i class="bi bi-pencil me-1"></i> Edit Mapping</a>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="sidebar.js"></script>
    <script src="item_mapping_seed.js"></script>
    <script>
        // Render sidebar immediately (reads role from session)
        new SidebarSystem(null, 'item_mapping').render();

        // Auth
        const sess = localStorage.getItem("IBOCS_user");
        if (!sess) window.location.href = "login.html";
        const user = JSON.parse(sess);
        document.getElementById("userBtn").textContent = user.name || "Admin";
        document.getElementById("userInfo").textContent = `${user.email} • role=admin`;
        document.getElementById("btnLogout").addEventListener("click", () => {
            localStorage.removeItem("IBOCS_user");
            window.location.href = "login.html";
        });

        // App state
        let masterData = null;
        let allItems = [];
        const urlParams = new URLSearchParams(window.location.search);
        const qSrc = urlParams.get('src');
        const qTgt = urlParams.get('tgt');

        async function init() {
            try {
                const res = await fetch('master_data.json');
                masterData = await res.json();
                
                allItems = [
                    ...masterData.pakan.map(i => ({...i, type: 'Pakan', defaultUom: i.satuan || 'Kg'})),
                    ...masterData.jenis_ayam.map(i => ({...i, type: 'Ayam', defaultUom: 'Ekor'}))
                ];

                const entities = [...masterData.customers, ...masterData.vendors];
                const srcEnt = entities.find(x => x.code === qSrc);
                const tgtEnt = entities.find(x => x.code === qTgt);

                if(!srcEnt || !tgtEnt) {
                    alert('Invalid entity codes');
                    window.location.href = 'admin_item_mapping_list.html';
                    return;
                }

                document.getElementById('srcName').textContent = srcEnt.name;
                document.getElementById('srcCode').textContent = srcEnt.code;
                document.getElementById('tgtName').textContent = tgtEnt.name;
                document.getElementById('tgtCode').textContent = tgtEnt.code;

                document.getElementById('editMappingBtn').href = `admin_item_mapping_add.html?src=${qSrc}&tgt=${qTgt}`;

                renderMappingDetails();

            } catch (err) {
                console.error("Error loading master data", err);
            }
        }

        function getItemObj(id) {
            return allItems.find(x => x.id === id);
        }

        function renderMappingDetails() {
            const pMappings = JSON.parse(localStorage.getItem('IBOCS_master_mappings') || '{}');
            const key = `${qSrc}|${qTgt}`;
            const mapData = pMappings[key] || {};
            
            const tbody = document.getElementById('mappingDetailsBody');
            const mapKeys = Object.keys(mapData);

            if(mapKeys.length === 0) {
                tbody.innerHTML = `<tr><td colspan="2" class="text-center text-muted py-4">No mapping configuration exists for this pair.</td></tr>`;
                return;
            }

            let html = '';
            mapKeys.forEach(srcItemId => {
                const srcItem = getItemObj(srcItemId);
                const srcItemName = srcItem ? (srcItem.nama || srcItem.jenis) : srcItemId;
                const srcUom = srcItem ? srcItem.defaultUom : '-';
                
                const rules = mapData[srcItemId];

                let targetsHtml = rules.map(r => {
                    const tItem = getItemObj(r.targetId);
                    const tName = tItem ? (tItem.nama || tItem.jenis) : r.targetId;
                    return `<div class="d-flex align-items-center mb-2">
                                <i class="bi bi-box-seam me-2 text-muted"></i>
                                <span><strong>${r.multiplier} ${r.uom}</strong> of <span class="text-primary">${tName}</span> <small class="text-muted">(${r.targetId})</small></span>
                            </div>`;
                }).join('');

                html += `
                    <tr>
                        <td class="align-middle">
                            <div class="fw-bold fs-6">${srcItemName}</div>
                            <div class="small text-muted mb-1">${srcItemId}</div>
                            <div class="badge bg-secondary-subtle text-secondary border">Base Unit: ${srcUom}</div>
                        </td>
                        <td class="bg-light">
                            <div class="small text-muted text-uppercase fw-bold mb-2" style="font-size: 0.65rem;">Converts 1 ${srcUom} to:</div>
                            ${targetsHtml}
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
        }

        if(qSrc && qTgt) {
            init();
        } else {
            window.location.href = "admin_item_mapping_list.html";
        }
    </script>
</body>
</html>
