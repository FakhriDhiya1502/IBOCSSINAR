<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vendor | Sales Order Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: #f4f6f9;
            font-family: Arial, Helvetica, sans-serif;
        }

        .sidebar {
            min-height: calc(100vh - 56px);
        }

        .nav-pill {
            border-radius: 10px;
        }

        .card {
            border: 0;
        }

        .muted-xs {
            font-size: .82rem;
            color: #6c757d;
        }

        :root {
            --bg: #f4f6f9;
            --card: #fff;
            --line: #d9e0ea;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #2563eb;
            --success: #15803d;
            --warning: #b45309;
            --soft: #f8fafc;
        }

        .page {
            padding: 16px;
            background: white;
            border-radius: 10px;
            border: 1px solid var(--line);
        }

        .toolbar,
        .my-card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 10px;
        }

        .toolbar {
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            flex-wrap: wrap;
            box-shadow: 0 2px 8px rgba(15, 23, 42, .04);
        }

        button {
            border: 1px solid var(--line);
            background: #fff;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        button.primary {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .my-card {
            padding: 14px;
            margin-bottom: 14px;
            box-shadow: 0 2px 8px rgba(15, 23, 42, .04);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1.7fr 1fr;
            gap: 14px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field label {
            font-size: 11px;
            color: var(--muted);
            font-weight: 700;
            text-transform: uppercase;
        }

        .field input,
        .field textarea {
            padding: 8px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: var(--soft);
            width: 100%;
        }

        .field textarea {
            resize: vertical;
        }

        .field.span-2 {
            grid-column: span 2;
        }

        .field.span-4 {
            grid-column: span 4;
        }

        .info-stack {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .info-box {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 10px;
            background: #fafafa;
        }

        .info-box .label {
            font-size: 11px;
            color: var(--muted);
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .table-wrap {
            overflow: auto;
            border: 1px solid var(--line);
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th,
        td {
            border-bottom: 1px solid var(--line);
            padding: 8px;
            text-align: left;
            white-space: nowrap;
        }

        th {
            background: var(--soft);
        }

        .type,
        .status,
        .source {
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            display: inline-block;
        }

        .type-forecast {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .type-special {
            background: #fef3c7;
            color: #92400e;
        }

        .type-manual {
            background: #f3f4f6;
            color: #374151;
        }

        .type-from-po {
            background: #ede9fe;
            color: #5b21b6;
        }

        .status-draft {
            background: #e0f2fe;
            color: #0369a1;
        }

        .status-open {
            background: #d1fae5;
            color: #065f46;
        }

        .status-submitted {
            background: #dcfce7;
            color: #166534;
        }

        .btn-confirm-action {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-confirm-action:hover { background: #a7f3d0; }

        .source-forecast {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .source-manual {
            background: #f3f4f6;
            color: #374151;
        }

        .source-special {
            background: #fef3c7;
            color: #92400e;
        }

        .timeline {
            border-left: 3px solid #e5e7eb;
            padding-left: 12px;
        }

        .timeline-item {
            margin-bottom: 14px;
            position: relative;
        }

        .timeline-item:before {
            content: "";
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #94a3b8;
            position: absolute;
            left: -18px;
            top: 4px;
        }

        .timeline-time {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .muted {
            color: var(--muted);
        }

        @media (max-width:1000px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }

            .form-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .info-stack {
                grid-template-columns: 1fr;
            }

            .field.span-2,
            .field.span-4 {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>
    <!-- Topbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container-fluid px-3">
            <a class="navbar-brand fw-bold" href="vendor_dashboard.html">IBOCS</a>
            <span class="navbar-text text-white-50 small d-none d-md-inline">Vendor Portal</span>

            <div class="ms-auto d-flex align-items-center gap-2">
                <div class="dropdown">
                    <button class="btn btn-outline-light btn-sm dropdown-toggle" data-bs-toggle="dropdown"
                        id="userBtn">User</button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><span class="dropdown-item-text small text-muted" id="userInfo">-</span></li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <li><a class="dropdown-item" href="index.html">Ganti Portal</a></li>
                        <li><button class="dropdown-item text-danger" id="btnLogout">Logout</button></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-3">
        <div class="row g-3">

            <!-- Sidebar -->
            <div class="col-lg-2" id="sidebar-container"></div>

            <!-- Main -->
            <div class="col-lg-10">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="mb-0 text-success fw-bold"><i class="bi bi-file-earmark-text me-2"></i>Sales Order Detail
                    </h4>
                </div>

                <div class="page shadow-sm">
                    <div class="toolbar">
                        <div>
                            <div style="font-size:20px;font-weight:700;">Sales Order Detail</div>
                            <div class="muted" id="soSubtitle">Loading...</div>
                        </div>
                        <div style="display:flex;gap:8px;flex-wrap:wrap;">
                            <button onclick="window.location.href='vendor_salesorderlist.html'">Back to List</button>
                            <button id="btnConfirm" class="btn-confirm-action" style="display:none;" onclick="confirmSO()">✓ Confirm → Open</button>
                            <button class="primary" onclick="window.print()">Print</button>
                        </div>
                    </div>

                    <div class="grid-2">
                        <div class="my-card">
                            <h3 style="margin-top:0;">Header</h3>
                            <div class="form-grid">
                                <div class="field">
                                    <label>SO No</label>
                                    <input id="vSoNo" readonly />
                                </div>
                                <div class="field">
                                    <label>SO Date</label>
                                    <input id="vSoDate" readonly />
                                </div>
                                <div class="field">
                                    <label>Delivery Date</label>
                                    <input id="vDeliveryDate" readonly />
                                </div>
                                <div class="field">
                                    <label>Order Slot</label>
                                    <input id="vSlot" readonly />
                                </div>

                                <div class="field">
                                    <label>Store</label>
                                    <input id="vStore" readonly />
                                </div>
                                <div class="field span-2">
                                    <label>Customer</label>
                                    <input id="vCustomer" readonly />
                                </div>
                                <div class="field">
                                    <label>Type</label>
                                    <div id="vType"></div>
                                </div>

                                <div class="field span-4">
                                    <label>Source PO</label>
                                    <input id="vSourcePo" readonly />
                                </div>

                                <div class="field span-4">
                                    <label>Notes</label>
                                    <textarea id="vNotes" rows="2" readonly></textarea>
                                </div>
                            </div>
                        </div>

                        <div class="my-card">
                            <h3 style="margin-top:0;">Summary</h3>
                            <div class="info-stack">
                                <div class="info-box">
                                    <div class="label">Status</div>
                                    <div id="vStatus"></div>
                                </div>
                                <div class="info-box">
                                    <div class="label">Total Line</div>
                                    <div id="vTotalLine">-</div>
                                </div>
                                <div class="info-box">
                                    <div class="label">Total Qty</div>
                                    <div id="vTotalQty">-</div>
                                </div>
                                <div class="info-box">
                                    <div class="label">Created By</div>
                                    <div id="vCreatedBy">-</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="my-card">
                        <h3 style="margin-top:0;">Detail Items</h3>
                        <div class="table-wrap">
                            <table>
                                <thead>
                                    <tr>
                                        <th>No</th>
                                        <th>Item Code</th>
                                        <th>Item Name</th>
                                        <th>Qty</th>
                                        <th>UoM</th>
                                        <th>Source</th>
                                    </tr>
                                </thead>
                                <tbody id="vItemBody">
                                    <tr><td colspan="6" style="text-align:center;padding:20px;color:#6b7280;">Loading...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                </div>

                <div class="text-center text-muted small mt-4 mb-2">
                    © 2026 IBOCS — Vendor Portal
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="sidebar.js"></script>

    <script>
        // =========================
        // SESSION GUARD
        // =========================
        const sess = localStorage.getItem("IBOCS_user");
        if (!sess) window.location.href = "login.html?role=vendor";
        const user = JSON.parse(sess);

        document.getElementById("userBtn").textContent = user.name || "User";
        document.getElementById("userInfo").textContent = `${user.email} • role=${user.role}`;

        document.getElementById("btnLogout").addEventListener("click", () => {
            localStorage.removeItem("IBOCS_user");
            window.location.href = "index.html";
        });

        // =========================
        // SIDEBAR + LOAD SO
        // =========================
        document.addEventListener("DOMContentLoaded", () => {
            new SidebarSystem(null, 'salesorder').render();
            loadSO();
        });

        const DEMO_SO = [
            { soNo: "SO-202604-1001", soDate: "2026-04-01", deliveryDate: "2026-04-02", store: "Toko Melati", customer: "PT. Melati Customer Jaya", type: "FORECAST", slot: "AM", totalQty: 25, status: "Submitted", sourcePoNo: null, notes: "Order ditarik otomatis dari forecast untuk pengiriman pagi.", lines: [{ itemCode: "BRD-001", itemName: "Butter Croissant", qty: 10, uom: "PCS", source: "Forecast" }, { itemCode: "BRD-002", itemName: "Almond Croissant", qty: 5, uom: "PCS", source: "Forecast" }] },
            { soNo: "SO-202604-1002", soDate: "2026-04-01", deliveryDate: "2026-04-02", store: "Toko Mawar",  customer: "PT. Mawar Niaga Abadi", type: "SPECIAL",  slot: "PM", totalQty: 12, status: "Submitted", sourcePoNo: null, notes: "", lines: [] }
        ];

        function getSO(soNo) {
            const stored = JSON.parse(localStorage.getItem("IBOCS_so_list") || "[]");
            return [...stored, ...DEMO_SO].find(s => s.soNo === soNo) || null;
        }

        function typeLabel(type) {
            const map = {
                FORECAST: '<span class="type type-forecast">Forecast</span>',
                MANUAL:   '<span class="type type-manual">Manual</span>',
                SPECIAL:  '<span class="type type-special">Special</span>',
                FROM_PO:  '<span class="type type-from-po">From PO</span>'
            };
            return map[type] || `<span class="type type-manual">${type}</span>`;
        }

        function statusLabel(s) {
            const map = {
                Draft:     '<span class="status status-draft">Draft</span>',
                Open:      '<span class="status status-open">Open</span>',
                Submitted: '<span class="status status-submitted">Submitted</span>'
            };
            return map[s] || `<span class="status">${s}</span>`;
        }

        function loadSO() {
            const params = new URLSearchParams(window.location.search);
            const soNo   = params.get("soNo");
            if (!soNo) { document.getElementById("soSubtitle").textContent = "No SO selected."; return; }

            const so = getSO(soNo);
            if (!so) { document.getElementById("soSubtitle").textContent = `SO ${soNo} not found.`; return; }

            document.getElementById("soSubtitle").textContent = `${so.soNo} — ${so.status}`;
            document.getElementById("vSoNo").value        = so.soNo;
            document.getElementById("vSoDate").value      = so.soDate || "";
            document.getElementById("vDeliveryDate").value = so.deliveryDate || "";
            document.getElementById("vSlot").value        = so.slot || "";
            document.getElementById("vStore").value       = so.store || "";
            document.getElementById("vCustomer").value    = so.customer || "";
            document.getElementById("vType").innerHTML    = typeLabel(so.type);
            document.getElementById("vSourcePo").value    = so.sourcePoNo || "-";
            document.getElementById("vNotes").value       = so.notes || "";
            document.getElementById("vStatus").innerHTML  = statusLabel(so.status);
            document.getElementById("vTotalLine").textContent = so.lines ? so.lines.length : (so.totalQty ? "-" : 0);
            document.getElementById("vTotalQty").textContent  = so.totalQty ?? "-";
            document.getElementById("vCreatedBy").textContent = so.createdBy || user.name || "-";

            // Lines — editable qty only for Draft FROM_PO, otherwise readonly
            const tbody = document.getElementById("vItemBody");
            const canEdit = so.status === "Draft" && so.sourcePoNo;
            if (so.lines && so.lines.length) {
                tbody.innerHTML = so.lines.map((l, i) => {
                    const qtyCell = canEdit
                        ? `<input class="qty-input" type="number" min="0" value="${l.qty ?? 0}" oninput="recalcTotal()" style="width:80px;padding:4px 6px;border:1px solid #d5dae3;border-radius:6px;font-size:13px;">`
                        : (l.qty ?? "-");
                    return `
                    <tr>
                        <td>${i + 1}</td>
                        <td>${l.itemCode || "-"}</td>
                        <td>${l.itemName || "-"}</td>
                        <td>${qtyCell}</td>
                        <td>${l.uom || "PCS"}</td>
                        <td><span class="source source-${(l.source||"manual").toLowerCase()}">${l.source || "Manual"}</span></td>
                    </tr>`;
                }).join("");
            } else {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:20px;color:#6b7280;">No items.</td></tr>`;
            }

            // Show Confirm button only for Draft SO from PO
            if (canEdit) {
                document.getElementById("btnConfirm").style.display = "";
            }
        }

        function recalcTotal() {
            const total = [...document.querySelectorAll(".qty-input")]
                .reduce((s, el) => s + (Number(el.value) || 0), 0);
            document.getElementById("vTotalQty").textContent = total;
        }

        function confirmSO() {
            const params = new URLSearchParams(window.location.search);
            const soNo   = params.get("soNo");
            const list   = JSON.parse(localStorage.getItem("IBOCS_so_list") || "[]");
            const idx    = list.findIndex(s => s.soNo === soNo);
            if (idx < 0) { alert("SO not found in storage."); return; }

            // Save edited qty back into lines
            const qtyInputs = [...document.querySelectorAll(".qty-input")];
            if (list[idx].lines) {
                list[idx].lines.forEach((l, i) => {
                    if (qtyInputs[i]) l.qty = Number(qtyInputs[i].value) || 0;
                });
                list[idx].totalQty = list[idx].lines.reduce((s, l) => s + l.qty, 0);
            }

            list[idx].status = "Open";
            localStorage.setItem("IBOCS_so_list", JSON.stringify(list));

            // Lock qty inputs after confirm
            qtyInputs.forEach(el => { el.readOnly = true; el.style.background = "#f8fafc"; });

            document.getElementById("btnConfirm").style.display = "none";
            document.getElementById("vStatus").innerHTML = '<span class="status status-open">Open</span>';
            document.getElementById("vTotalQty").textContent = list[idx].totalQty ?? "-";
            document.getElementById("soSubtitle").textContent = `${soNo} — Open`;
        }
    </script>
</body>

</html>
