<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBOCS | Forecast History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8faff; color: #1e293b; }
        .page { background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); margin-top: 24px; padding: 24px; }
        
        .topbar { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 24px; border-bottom: 2px solid #f1f5f9; padding-bottom: 16px; }
        .topbar h1 { font-size: 22px; font-weight: 800; color: #0f172a; margin: 0; }
        .topbar .subtext { font-size: 13px; color: #64748b; margin-top: 4px; }

        .table-custom { width: 100%; border-collapse: separate; border-spacing: 0; }
        .table-custom th { background: #f8fafc; color: #475569; font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; padding: 14px 16px; border-bottom: 2px solid #e2e8f0; }
        .table-custom td { padding: 16px; font-size: 13px; color: #334155; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        .table-custom tbody tr { transition: all 0.2s; cursor: pointer; }
        .table-custom tbody tr:hover { background-color: #f8faff; transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.04); }

        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .status-draft { background: #f1f5f9; color: #475569; }
        .status-po { background: #ecfdf5; color: #059669; }

        .fc-link { color: #4338ca; font-weight: 700; text-decoration: none; }
        .fc-link:hover { text-decoration: underline; }

        .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; }
        .empty-state i { font-size: 48px; margin-bottom: 16px; color: #cbd5e1; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="bi bi-box-seam text-primary me-2"></i>IBOCS Portal</a>
            <div class="d-flex align-items-center gap-3">
                <div class="dropdown">
                    <button class="btn btn-light dropdown-toggle rounded-pill border" type="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle text-primary me-1"></i>
                        <span class="fw-bold text-dark" style="font-size: 13px;" id="userNameDisplay">Customer</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow border-0">
                        <li><a class="dropdown-item" href="#"><i class="bi bi-person me-2"></i>Profile</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="login.html" onclick="localStorage.removeItem('IBOCS_user')"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-2 p-0 bg-light border-end" id="sidebar-container" style="min-height: calc(100vh - 56px);"></div>
            <div class="col-lg-10 p-4">
                <div class="d-flex align-items-center gap-2 mb-2 text-muted" style="font-size: 13px; font-weight: 600;">
                    <i class="bi bi-house-door-fill"></i> / <span class="text-primary">Feed</span> / <span class="text-dark">Forecast History</span>
                </div>

                <div class="page">
                    <div class="topbar">
                        <div>
                            <h1>Forecast History</h1>
                            <div class="subtext">Daftar semua dokumen rekomendasi kebutuhan pakan (Forecast) yang telah di-generate.</div>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table-custom">
                            <thead>
                                <tr>
                                    <th>No Forecast</th>
                                    <th>Tanggal</th>
                                    <th>Company</th>
                                    <th>Farm / Kandang</th>
                                    <th>Total Item</th>
                                    <th>Total QTY</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="historyList">
                                <!-- Rendered by JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="text-center text-muted small mt-4 mb-2">© 2026 IBOCS — Customer Portal</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="sidebar.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            new SidebarSystem(null, 'forecast_history').render();
            
            const userData = JSON.parse(localStorage.getItem("IBOCS_user") || "{}");
            if(userData.name) document.getElementById("userNameDisplay").textContent = userData.name;

            renderHistory();
        });

        function getFcList() {
            const DEMO_FC = [
                { fcNo: "FC-001", fcDate: "2026-04-29", company: "PT TOP Distribusi", farm: "Farm Deli", warehouse: "WH-KDG01", status: "Draft", totalPop: "9,850", lines: [{ standardNeed: 7000, manualAdjustment: 300 }, { standardNeed: 5000, manualAdjustment: 200 }] },
                { fcNo: "FC-002", fcDate: "2026-04-29", company: "PT TOP Distribusi", farm: "Farm Deli", warehouse: "WH-KDG02", status: "Forecast Created", totalPop: "9,750", lines: [{ standardNeed: 8000, manualAdjustment: 0 }, { standardNeed: 7000, manualAdjustment: 0 }] },
                { fcNo: "FC-003", fcDate: "2026-04-28", company: "PT AYM", farm: "Farm Binjai", warehouse: "WH-KDG03", status: "PO Created", totalPop: "9,250", lines: [{ standardNeed: 6200, manualAdjustment: 0 }, { standardNeed: 0, manualAdjustment: 4300 }] }
            ];
            const stored = JSON.parse(localStorage.getItem("IBOCS_fc_list") || "[]");
            const storedNos = new Set(stored.map(f => f.fcNo));
            return [...stored, ...DEMO_FC.filter(d => !storedNos.has(d.fcNo))];
        }

        function renderHistory() {
            const history = getFcList();
            const tbody = document.getElementById("historyList");

            if (history.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7">
                            <div class="empty-state">
                                <i class="bi bi-inbox"></i>
                                <h5 class="fw-bold text-dark">Belum Ada Forecast</h5>
                                <p>Anda belum men-generate dokumen Forecast dari halaman Feed Forecast.</p>
                                <a href="customer_ForecastList.html" class="btn btn-primary mt-2 fw-bold" style="border-radius:8px;">Buka Feed Forecast</a>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }

            const sorted = [...history].sort((a,b) => b.fcNo.localeCompare(a.fcNo));

            tbody.innerHTML = sorted.map(fc => {
                const statusCls = fc.status === 'PO Created' ? 'status-po' : 'status-draft';
                const totalItem = fc.lines ? fc.lines.length : 0;
                
                // Calculate total qty from lines
                let totalQty = 0;
                if(fc.lines) {
                    totalQty = fc.lines.reduce((sum, r) => sum + (parseFloat(r.recommendedQty || r.standardNeed) || 0) + (parseFloat(r.manualAdjustment) || 0), 0);
                }

                // parse date
                let dateStr = fc.fcDate;
                if(fc.fcDate) {
                    const d = new Date(fc.fcDate);
                    if(!isNaN(d)) dateStr = d.toLocaleDateString("id-ID", { day: '2-digit', month: 'short', year: 'numeric' });
                }

                return `
                    <tr onclick="window.location.href='customer_ForecastView.html?fcNo=${fc.fcNo}'">
                        <td><a href="customer_ForecastView.html?fcNo=${fc.fcNo}" class="fc-link">${fc.fcNo}</a></td>
                        <td>${dateStr}</td>
                        <td class="fw-bold">${fc.company || "-"}</td>
                        <td>${fc.farm || "-"} / ${fc.warehouse || "-"}</td>
                        <td>${totalItem} Item</td>
                        <td class="fw-bold text-success">${totalQty.toLocaleString('id-ID')} kg</td>
                        <td><span class="status-badge ${statusCls}">${fc.status}</span></td>
                    </tr>
                `;
            }).join("");
        }
    </script>
</body>
</html>
