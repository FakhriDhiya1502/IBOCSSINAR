<!doctype html>
<html lang="id">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Item Mappings List — IBOCS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: #f4f6f9; }
        .sidebar { min-height: calc(100vh - 56px); }
        .card { border: 0; border-radius: 12px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid px-3">
            <a class="navbar-brand fw-bold" href="admin_dashboard.html">
                <i class="bi bi-shield-lock-fill me-2"></i>IBOCS Admin
            </a>
            <span class="navbar-text text-white-50 small d-none d-md-inline">Platform Management</span>
            <div class="ms-auto d-flex align-items-center gap-2">
                <div class="dropdown">
                    <button class="btn btn-outline-light btn-sm dropdown-toggle" data-bs-toggle="dropdown" id="userBtn">Admin</button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><span class="dropdown-item-text small text-muted" id="userInfo">-</span></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><button class="dropdown-item text-danger" id="btnLogout">Logout</button></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid py-3">
        <div class="row g-3">
            <div class="col-lg-2" id="sidebar-container"></div>
            <div class="col-lg-10">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h5 class="fw-bold">Item Mappings Directory</h5>
                        <div class="text-muted small">View all configured mappings and unit conversions between entities.</div>
                    </div>
                    <a href="admin_item_mapping_add.html" class="btn btn-success">
                        <i class="bi bi-plus-circle me-1"></i> Add New Mapping
                    </a>
                </div>

                <div class="card shadow-sm">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                        <h6 class="mb-0 fw-bold">Configured Item Mappings</h6>
                        <div class="input-group input-group-sm" style="width: 250px;">
                            <input type="text" class="form-control" placeholder="Search entity..." id="searchInput">
                            <button class="btn btn-outline-secondary" type="button"><i class="bi bi-search"></i></button>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light text-secondary small text-uppercase">
                                    <tr>
                                        <th>Mapping Pair</th>
                                        <th>Source Entity</th>
                                        <th>Target Entity</th>
                                        <th class="text-center">Items Mapped</th>
                                        <th class="text-center">Action</th>
                                    </tr>
                                </thead>
                                <tbody id="mappingTableBody">
                                    <!-- Rows populated by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="sidebar.js"></script>
    <script src="item_mapping_seed.js"></script>
    <script>
        // Render sidebar immediately (reads role from session)
        new SidebarSystem(null, 'item_mapping').render();

        const sess = localStorage.getItem("IBOCS_user");
        if (!sess) window.location.href = "login.html";
        const user = JSON.parse(sess);
        document.getElementById("userBtn").textContent = user.name || "Admin";
        document.getElementById("userInfo").textContent = `${user.email} • role=admin`;
        document.getElementById("btnLogout").addEventListener("click", () => {
            localStorage.removeItem("IBOCS_user");
            window.location.href = "login.html";
        });

        let masterData = null;
        let pMappings = {};

        async function init() {
            try {
                const res = await fetch('master_data.json');
                masterData = await res.json();
                pMappings = JSON.parse(localStorage.getItem('IBOCS_master_mappings') || '{}');
                renderTable();
            } catch (err) {
                console.error("Error loading master data", err);
            }
        }

        function getEntityName(code) {
            if (!masterData) return code;
            const entities = [...masterData.customers, ...masterData.vendors];
            const e = entities.find(x => x.code === code);
            return e ? e.name : code;
        }

        function renderTable() {
            const tbody = document.getElementById('mappingTableBody');
            const keys = Object.keys(pMappings);
            
            if(keys.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-5"><i class="bi bi-diagram-2 fs-3 d-block mb-3"></i>No item mappings found.<br><a href="admin_item_mapping_add.html" class="btn btn-sm btn-outline-success mt-2">Create your first mapping</a></td></tr>`;
                return;
            }

            let html = '';
            keys.forEach(key => {
                const parts = key.split('|');
                const srcCode = parts[0];
                const tgtCode = parts[1];
                
                const srcName = getEntityName(srcCode);
                const tgtName = getEntityName(tgtCode);
                
                const mappedItems = Object.keys(pMappings[key] || {}).length;

                // Skip if mappedItems == 0, assuming it's empty
                if (mappedItems > 0) {
                    html += `
                        <tr>
                            <td>
                                <div class="fw-bold">${srcCode} <i class="bi bi-arrow-right text-muted mx-1"></i> ${tgtCode}</div>
                            </td>
                            <td>${srcName}</td>
                            <td>${tgtName}</td>
                            <td class="text-center">
                                <span class="badge bg-success rounded-pill px-3">${mappedItems} items</span>
                            </td>
                            <td class="text-center">
                                <a href="admin_item_mapping_view.html?src=${srcCode}&tgt=${tgtCode}" class="btn btn-sm btn-outline-primary" title="View details"><i class="bi bi-eye"></i> View</a>
                                <a href="admin_item_mapping_add.html?src=${srcCode}&tgt=${tgtCode}" class="btn btn-sm btn-outline-secondary ms-1" title="Edit mapping"><i class="bi bi-pencil"></i></a>
                            </td>
                        </tr>
                    `;
                }
            });

            if (html === '') {
                 tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-5"><i class="bi bi-diagram-2 fs-3 d-block mb-3"></i>No valid item mappings found.</td></tr>`;
            } else {
                tbody.innerHTML = html;
            }
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            const rows = document.querySelectorAll('#mappingTableBody tr');
            rows.forEach(r => {
                r.style.display = r.innerText.toLowerCase().includes(term) ? '' : 'none';
            });
        });

        init();
    </script>
</body>
</html>
