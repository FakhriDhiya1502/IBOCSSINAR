<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBOCS | Review Bulk AP</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="sidebar.js"></script>
    <style>
        body { background:#f4f6fb; font-family:'Segoe UI', sans-serif; color:#1f2937; font-size:13px; }
        .card { border:1px solid #e5eaf3; border-radius:8px; box-shadow:0 2px 10px rgba(0,0,0,.05); margin-bottom:16px; }
        .card-header-custom { background:#fff; border-bottom:1px solid #e8ecf4; padding:14px 18px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
        .section-label { font-weight:800; color:#1a237e; display:flex; align-items:center; gap:8px; }
        .summary-grid { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:10px; }
        .summary-card { background:#fff; border:1px solid #e5eaf3; border-radius:8px; padding:12px 14px; }
        .summary-label { font-size:11px; color:#64748b; font-weight:800; text-transform:uppercase; }
        .summary-value { margin-top:4px; font-size:22px; font-weight:800; color:#1a237e; }
        .toolbar { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
        .status-badge { padding:3px 10px; border-radius:999px; font-size:11px; font-weight:800; }
        .s-ready { background:#ecfdf5; color:#047857; }
        .s-warning { background:#fffbeb; color:#92400e; }
        .s-error { background:#fef2f2; color:#b91c1c; }
        .btn-review { border:0; border-radius:7px; padding:6px 10px; font-size:12px; font-weight:800; display:inline-flex; align-items:center; gap:5px; }
        .btn-primary-soft { background:#e0e7ff; color:#1a237e; }
        .btn-confirm { background:#1a237e; color:#fff; border:0; border-radius:7px; padding:8px 14px; font-weight:800; }
        .btn-confirm:disabled { background:#94a3b8; }
        th { background:#f8faff; color:#374151; font-size:11px; text-transform:uppercase; letter-spacing:.3px; white-space:nowrap; }
        td { vertical-align:middle; }
        .group-row td { background:#eef2ff; color:#1a237e; font-weight:800; border-top:2px solid #c7d2fe; }
        .source-chip { display:inline-flex; align-items:center; gap:5px; border:1px solid #dbe3f0; border-radius:999px; padding:3px 8px; background:#fff; font-weight:700; color:#334155; }
        .detail-panel { background:#fff; border:1px solid #dbe3f0; border-left:4px solid #1a237e; border-radius:8px; padding:12px; }
        .mini-title { font-size:11px; font-weight:900; color:#1a237e; text-transform:uppercase; margin-bottom:7px; }
        .empty-state { padding:48px; text-align:center; color:#94a3b8; }
        .bottom-bar { position:sticky; bottom:0; background:#fff; border-top:1px solid #dbe3f0; padding:12px 18px; display:flex; gap:12px; align-items:center; justify-content:flex-end; box-shadow:0 -3px 12px rgba(0,0,0,.07); }
        @media (max-width: 1000px) { .summary-grid { grid-template-columns:repeat(2,minmax(0,1fr)); } }
        @media (max-width: 640px) { .summary-grid { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark" style="background:#1a237e; padding:10px 24px;">
        <a class="navbar-brand fw-bold" href="customer_dashboard.html">IBOCS</a>
        <span class="text-white-50 small ms-auto" id="navUser"></span>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-2" id="sidebar-container"></div>
            <div class="col-lg-10 py-4 px-4">
                <div class="d-flex justify-content-between align-items-start mb-3 flex-wrap gap-2">
                    <div>
                        <h4 class="fw-bold mb-1"><i class="bi bi-clipboard-check me-2" style="color:#1a237e;"></i>Review Bulk AP</h4>
                        <p class="text-muted small mb-0">Cek batch, source document, dan exception sebelum AP dibuat.</p>
                    </div>
                    <a href="customer_AP.html" class="btn btn-outline-secondary btn-sm fw-bold"><i class="bi bi-arrow-left me-1"></i>Kembali</a>
                </div>

                <div class="card">
                    <div class="card-header-custom">
                        <span class="section-label"><i class="bi bi-clipboard-data"></i> Batch Summary</span>
                        <span class="text-muted small" id="batchMeta"></span>
                    </div>
                    <div class="card-body">
                        <div class="summary-grid" id="summaryGrid"></div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header-custom">
                        <span class="section-label"><i class="bi bi-table"></i> Draft AP by Vendor</span>
                        <div class="toolbar">
                            <select id="fStatus" class="form-select form-select-sm" onchange="render()">
                                <option value="">Semua Status</option>
                                <option value="Ready">Ready</option>
                                <option value="Warning">Warning</option>
                                <option value="Error">Error</option>
                            </select>
                            <input id="fSearch" class="form-control form-control-sm" placeholder="Cari vendor / GRPO / PO" oninput="render()" style="width:240px;">
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table mb-0">
                            <thead>
                                <tr>
                                    <th style="width:40px;"></th>
                                    <th>Status</th>
                                    <th>Vendor</th>
                                    <th>Source Docs</th>
                                    <th>PO Ref</th>
                                    <th>Due Date</th>
                                    <th class="text-end">Qty</th>
                                    <th class="text-end">Total</th>
                                    <th style="width:80px;"></th>
                                </tr>
                            </thead>
                            <tbody id="reviewBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <span class="text-muted me-auto" id="selectedInfo">0 AP selected</span>
        <button class="btn btn-outline-secondary btn-sm fw-bold" onclick="window.location.href='customer_AP.html'">Batal</button>
        <button class="btn-confirm" id="confirmBtn" onclick="confirmCreate()"><i class="bi bi-check2-circle me-1"></i>Create Selected AP</button>
    </div>

    <script>
        const sess = JSON.parse(localStorage.getItem("IBOCS_user") || "{}");
        if (!sess || !sess.role) window.location.href = "login.html";
        document.getElementById("navUser").textContent = sess.name || sess.username || "";
        new SidebarSystem(null, "ap_list").render();

        let batch = JSON.parse(localStorage.getItem("IBOCS_ap_review_batch") || "null");
        let expanded = new Set();

        function fmt(n) { return "IDR " + Math.round(Number(n || 0)).toLocaleString("id-ID"); }
        function esc(v) {
            return String(v ?? "").replace(/[&<>"']/g, ch => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[ch]));
        }
        function statusBadge(status) {
            const cls = status === "Error" ? "s-error" : status === "Warning" ? "s-warning" : "s-ready";
            return `<span class="status-badge ${cls}">${esc(status || "Ready")}</span>`;
        }
        function sourceLabel(draft) {
            const docs = draft.sourceDocs || [];
            if (!docs.length) return "-";
            const first = docs[0].docNo || "-";
            const more = docs.length > 1 ? ` + ${docs.length - 1} more` : "";
            return `<span class="source-chip"><i class="bi bi-link-45deg"></i>${esc(first)}${more}</span>`;
        }
        function getFilteredDrafts() {
            if (!batch) return [];
            const status = document.getElementById("fStatus").value;
            const q = document.getElementById("fSearch").value.trim().toLowerCase();
            return (batch.drafts || []).filter(d => {
                const haystack = [d.vendor, d.grpoRef, d.poRef, ...(d.sourceDocs || []).map(s => s.docNo)].join(" ").toLowerCase();
                if (status && d.validationStatus !== status) return false;
                if (q && !haystack.includes(q)) return false;
                return true;
            });
        }
        function renderSummary() {
            const drafts = batch?.drafts || [];
            const selected = drafts.filter(d => d.selected);
            const totalAmount = selected.reduce((s, d) => s + Number(d.total || 0), 0);
            const vendorCount = new Set(selected.map(d => d.vendor).filter(Boolean)).size;
            document.getElementById("summaryGrid").innerHTML = `
                <div class="summary-card"><div class="summary-label">Draft AP</div><div class="summary-value">${drafts.length}</div></div>
                <div class="summary-card"><div class="summary-label">Ready</div><div class="summary-value" style="color:#047857;">${drafts.filter(d => d.validationStatus === "Ready").length}</div></div>
                <div class="summary-card"><div class="summary-label">Warning</div><div class="summary-value" style="color:#92400e;">${drafts.filter(d => d.validationStatus === "Warning").length}</div></div>
                <div class="summary-card"><div class="summary-label">Error</div><div class="summary-value" style="color:#b91c1c;">${drafts.filter(d => d.validationStatus === "Error").length}</div></div>
                <div class="summary-card"><div class="summary-label">Selected Total</div><div class="summary-value" style="font-size:18px;">${fmt(totalAmount)}</div><div class="text-muted small">${selected.length} AP, ${vendorCount} vendor</div></div>`;
            document.getElementById("selectedInfo").textContent = `${selected.length} AP selected - ${fmt(totalAmount)}`;
            document.getElementById("confirmBtn").disabled = !selected.length || selected.some(d => d.validationStatus === "Error");
        }
        function detailRow(draft) {
            const docs = draft.sourceDocs || [];
            const docNos = docs.map(s => s.docNo).filter(Boolean).join(", ") || draft.grpoRef || "-";
            const lineRows = (draft.lines || []).map(l => `
                <tr>
                    <td class="fw-semibold text-primary">${esc(docNos)}</td>
                    <td>${esc(draft.poRef || "-")}</td>
                    <td>${esc(l.itemCode)}</td>
                    <td>${esc(l.itemName)}</td>
                    <td class="text-end">${Number(l.qty || 0).toLocaleString("id-ID")}</td>
                    <td class="text-end">${Number(l.unitPrice || 0).toLocaleString("id-ID")}</td>
                    <td class="text-end fw-bold">${fmt(l.subtotal)}</td>
                </tr>`).join("");
            const messages = (draft.validationMessages || []).map(m => `<div class="text-danger small"><i class="bi bi-exclamation-circle me-1"></i>${esc(m)}</div>`).join("");
            return `<tr><td colspan="9"><div class="detail-panel">
                ${messages || `<div class="text-success small mb-2"><i class="bi bi-check-circle me-1"></i>Draft siap dibuat AP.</div>`}
                <div class="mini-title">Generated AP Lines from Source</div>
                <table class="table table-sm mb-0">
                    <thead><tr><th>Source Doc</th><th>PO Ref</th><th>Item</th><th>Name</th><th class="text-end">Qty</th><th class="text-end">Price</th><th class="text-end">Subtotal</th></tr></thead>
                    <tbody>${lineRows || `<tr><td colspan="7" class="text-muted text-center py-3">Tidak ada detail item.</td></tr>`}</tbody>
                </table>
            </div></td></tr>`;
        }
        function render() {
            if (!batch || !(batch.drafts || []).length) {
                document.getElementById("reviewBody").innerHTML = `<tr><td colspan="9" class="empty-state"><i class="bi bi-inbox d-block fs-1 mb-2"></i>Tidak ada batch review. Pilih GRPO dari AP Generation dulu.</td></tr>`;
                renderSummary();
                return;
            }
            document.getElementById("batchMeta").textContent = batch.batchId || "";
            const groups = {};
            getFilteredDrafts().forEach(d => {
                const vendor = d.vendor || "Unknown";
                if (!groups[vendor]) groups[vendor] = [];
                groups[vendor].push(d);
            });
            let html = "";
            Object.entries(groups).forEach(([vendor, drafts]) => {
                const amount = drafts.reduce((s, d) => s + Number(d.total || 0), 0);
                html += `<tr class="group-row"><td colspan="9"><i class="bi bi-building me-2"></i>${esc(vendor)} <span class="text-muted ms-2 fw-normal">${drafts.length} AP - ${fmt(amount)}</span></td></tr>`;
                drafts.forEach(d => {
                    const id = esc(d.draftId);
                    html += `<tr>
                        <td><input type="checkbox" ${d.selected ? "checked" : ""} ${d.validationStatus === "Error" ? "disabled" : ""} onchange="toggleSelect('${id}', this.checked)"></td>
                        <td>${statusBadge(d.validationStatus)}</td>
                        <td class="fw-semibold">${esc(d.vendor || "-")}</td>
                        <td>${sourceLabel(d)}</td>
                        <td>${esc(d.poRef || "-")}</td>
                        <td>${esc(d.dueDate || "-")}</td>
                        <td class="text-end">${Number(d.totalQty || 0).toLocaleString("id-ID")}</td>
                        <td class="text-end fw-bold">${fmt(d.total)}</td>
                        <td><button class="btn-review btn-primary-soft" onclick="toggleDetail('${id}')"><i class="bi ${expanded.has(d.draftId) ? "bi-chevron-up" : "bi-chevron-down"}"></i>Detail</button></td>
                    </tr>`;
                    if (expanded.has(d.draftId)) html += detailRow(d);
                });
            });
            document.getElementById("reviewBody").innerHTML = html || `<tr><td colspan="9" class="empty-state">Tidak ada data sesuai filter.</td></tr>`;
            renderSummary();
        }
        function toggleSelect(id, selected) {
            const draft = (batch.drafts || []).find(d => d.draftId === id);
            if (draft) draft.selected = selected;
            localStorage.setItem("IBOCS_ap_review_batch", JSON.stringify(batch));
            renderSummary();
        }
        function toggleDetail(id) {
            expanded.has(id) ? expanded.delete(id) : expanded.add(id);
            render();
        }
        function nextApNo(baseLength, offset) {
            const today = new Date().toISOString().split("T")[0];
            return "AP-" + today.replace(/-/g, "").slice(2) + "-" + String(baseLength + offset + 1).padStart(4, "0");
        }
        function confirmCreate() {
            const apList = JSON.parse(localStorage.getItem("IBOCS_ap_list") || "[]");
            const baseLength = apList.length;
            const existingGrpoNos = new Set(apList.map(a => a.grpoRef));
            const selected = (batch.drafts || []).filter(d => d.selected && d.validationStatus !== "Error" && !existingGrpoNos.has(d.grpoRef));
            selected.forEach((d, index) => {
                const apNo = nextApNo(baseLength, index);
                apList.unshift({
                    apNo,
                    apDate: d.apDate,
                    dueDate: d.dueDate,
                    accountCode: d.accountCode,
                    notes: d.notes,
                    grpoRef: d.grpoRef,
                    poRef: d.poRef,
                    vendor: d.vendor,
                    sourceDocs: d.sourceDocs || [],
                    totalQty: d.totalQty,
                    discountPct: d.discountPct,
                    freight: d.freight,
                    totalBeforeDisc: d.totalBeforeDisc,
                    total: d.total,
                    status: "Open",
                    lines: d.lines || []
                });
            });
            localStorage.setItem("IBOCS_ap_list", JSON.stringify(apList));
            localStorage.removeItem("IBOCS_ap_review_batch");
            window.location.href = "customer_ap_list.html";
        }

        render();
    </script>
</body>
</html>
